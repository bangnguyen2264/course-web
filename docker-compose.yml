version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: edu-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./html:/etc/nginx/html:ro
      - nginx_logs:/var/log/nginx
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  nginx_logs:
    driver: local
